# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo → New Blueprint → select render.yaml
# Set GROQ_API_KEY in the Render dashboard after deploy.

services:
  - type: web
    name: pyforge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.cloud
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DOCKER_BUILDS_ENABLED
        value: "false"
      - key: ARTIFACTS_DIR
        value: /app/artifacts
      - key: PYTHONPATH
        value: /app

  - type: web
    name: pyforge-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pyforge-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_WS_URL
        fromService:
          type: web
          name: pyforge-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
