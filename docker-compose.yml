services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pyforge-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ARTIFACTS_DIR=/app/artifacts
    volumes:
      - ./backend/artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      builder-desktop:
        condition: service_completed_successfully
      builder-android:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - pyforge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: pyforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pyforge

  builder-desktop:
    build:
      context: ./backend/build-containers/desktop
      dockerfile: Dockerfile
    image: pyforge-builder-desktop:latest
    command: ["echo", "Desktop builder image ready"]
    networks:
      - pyforge

  builder-android:
    build:
      context: ./backend/build-containers/android
      dockerfile: Dockerfile
    image: pyforge-builder-android:latest
    command: ["echo", "Android builder image ready"]
    networks:
      - pyforge

networks:
  pyforge:
    name: pyforge_default
    driver: bridge
